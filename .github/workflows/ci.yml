name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - fix/**
  schedule:
    - cron: "0 3 * * 1"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install lint dependencies
        run: python -m pip install --upgrade pip ruff build

      - name: Ruff
        run: ruff check src tests

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: Shell syntax
        run: |
          shopt -s nullglob
          sh_files=(gh-address-cr/scripts/*.sh)
          if (( ${#sh_files[@]} > 0 )); then
            bash -n "${sh_files[@]}"
          fi

      - name: CLI smoke
        run: |
          python gh-address-cr/scripts/cli.py --help
          python gh-address-cr/scripts/cli.py cr-loop --help

      - name: Package build
        run: |
          rm -rf dist build
          python -m build

      - name: Package install
        run: |
          python -m venv .venv-package-smoke
          . .venv-package-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl

      - name: Installed CLI smoke
        run: |
          . .venv-package-smoke/bin/activate
          gh-address-cr --help
          python -m gh_address_cr --help
          gh-address-cr agent manifest

          run_domain_smoke() {
            set +e
            output="$("$@" 2>&1)"
            status=$?
            set -e
            printf '%s\n' "$output"
            if printf '%s\n' "$output" | grep -E 'Traceback|ModuleNotFoundError|No module named|command not found'; then
              exit 1
            fi
            if [ "$status" -ne 0 ] && ! printf '%s\n' "$output" | grep -E '"status"|"reason_code"|SESSION|session|missing|Final gate failed to evaluate|error connecting to api.github.com|check your internet connection'; then
              exit 1
            fi
          }

          run_domain_smoke gh-address-cr agent orchestrate status owner/repo 123
          run_domain_smoke gh-address-cr final-gate owner/repo 123
