name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Validation or publish target"
        type: choice
        required: true
        default: dry-run
        options:
          - dry-run
          - testpypi
          - pypi

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  build-release-package:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.package-version.outputs.version }}
      publish_target: ${{ steps.publish-target.outputs.target }}
      released: ${{ steps.package-version.outputs.released }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve publish target
        id: publish-target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.publish_target }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=pypi" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.publish-target.outputs.target == 'pypi'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install release dependencies
        if: steps.publish-target.outputs.target == 'pypi'
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/changelog \
            @semantic-release/commit-analyzer \
            @semantic-release/exec \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/release-notes-generator \
            conventional-changelog-conventionalcommits

      - name: Run semantic-release
        if: steps.publish-target.outputs.target == 'pypi'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Prepare staging package version
        if: steps.publish-target.outputs.target != 'pypi'
        run: |
          python3 scripts/set_package_version.py --version "0.0.0.dev${GITHUB_RUN_NUMBER}"
          python3 scripts/build_plugin_payload.py

      - name: Resolve package version
        id: package-version
        run: |
          if [ "${{ steps.publish-target.outputs.target }}" = "pypi" ]; then
            tag="$(git tag --points-at HEAD | grep '^v' | sort -V | tail -n 1 || true)"
            if [ -z "$tag" ]; then
              echo "released=false" >> "$GITHUB_OUTPUT"
              echo "version=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          else
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=0.0.0.dev${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.package-version.outputs.released == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package build dependencies
        if: steps.package-version.outputs.released == 'true'
        run: python -m pip install --upgrade pip build twine

      - name: Plugin payload check
        if: steps.package-version.outputs.released == 'true'
        run: python scripts/build_plugin_payload.py --check


      - name: Package build
        if: steps.package-version.outputs.released == 'true'
        run: |
          rm -rf dist build
          python -m build

      - name: Verify package version
        if: steps.package-version.outputs.released == 'true'
        env:
          PACKAGE_VERSION: ${{ steps.package-version.outputs.version }}
        run: |
          python - <<'PY'
          import email.parser
          import os
          import tarfile
          import zipfile
          from pathlib import Path

          expected = os.environ["PACKAGE_VERSION"]
          wheel = next(Path("dist").glob("*.whl"))
          sdist = next(Path("dist").glob("*.tar.gz"))

          with zipfile.ZipFile(wheel) as archive:
              metadata_name = next(name for name in archive.namelist() if name.endswith(".dist-info/METADATA"))
              metadata = email.parser.Parser().parsestr(archive.read(metadata_name).decode("utf-8"))
          if metadata["Version"] != expected:
              raise SystemExit(f"wheel version {metadata['Version']} does not match {expected}")

          with tarfile.open(sdist) as archive:
              metadata_member = next(member for member in archive.getmembers() if member.name.endswith("PKG-INFO"))
              metadata = email.parser.Parser().parsestr(archive.extractfile(metadata_member).read().decode("utf-8"))
          if metadata["Version"] != expected:
              raise SystemExit(f"sdist version {metadata['Version']} does not match {expected}")
          PY

      - name: Check package metadata
        if: steps.package-version.outputs.released == 'true'
        run: twine check dist/*

      - name: Render Homebrew formula from local sdist
        if: steps.package-version.outputs.released == 'true'
        env:
          PACKAGE_VERSION: ${{ steps.package-version.outputs.version }}
        run: |
          sdist="$(ls dist/*.tar.gz | head -n 1)"
          python scripts/release/render_homebrew_formula.py \
            --version "$PACKAGE_VERSION" \
            --sdist-path "$sdist" \
            --output /tmp/gh-address-cr.rb

      - name: Upload package artifacts
        if: steps.package-version.outputs.released == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gh-address-cr-dist
          path: dist/*

  publish-testpypi:
    needs: build-release-package
    runs-on: ubuntu-latest
    if: needs.build-release-package.outputs.released == 'true' && needs.build-release-package.outputs.publish_target == 'testpypi'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: gh-address-cr-dist
          path: dist

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build-release-package
    runs-on: ubuntu-latest
    if: >-
      needs.build-release-package.outputs.released == 'true' &&
      needs.build-release-package.outputs.publish_target == 'pypi'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: gh-address-cr-dist
          path: dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-homebrew:
    needs: [build-release-package, publish-pypi]
    runs-on: macos-latest
    if: >-
      needs.build-release-package.outputs.released == 'true' &&
      needs.build-release-package.outputs.publish_target == 'pypi'
    env:
      HOMEBREW_NO_INSTALL_FROM_API: "1"
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate Homebrew tap token
        id: homebrew-tap-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: RbBtSn0w
          repositories: homebrew-tap

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: RbBtSn0w/homebrew-tap
          token: ${{ steps.homebrew-tap-token.outputs.token }}
          path: homebrew-tap

      - name: Render Homebrew formula from PyPI
        env:
          PACKAGE_VERSION: ${{ needs.build-release-package.outputs.package_version }}
        run: |
          python scripts/release/render_homebrew_formula.py \
            --version "$PACKAGE_VERSION" \
            --output homebrew-tap/Formula/gh-address-cr.rb \
            --retries 12 \
            --retry-delay 10

      - name: Tap local formula
        run: brew tap RbBtSn0w/tap "$PWD/homebrew-tap"

      - name: Sync rendered Homebrew formula into tapped clone
        run: |
          tap_path="$(brew --repository RbBtSn0w/tap)"
          mkdir -p "$tap_path/Formula"
          cp homebrew-tap/Formula/gh-address-cr.rb "$tap_path/Formula/gh-address-cr.rb"

      - name: Update Python resources
        continue-on-error: true
        env:
          PACKAGE_VERSION: ${{ needs.build-release-package.outputs.package_version }}
        run: brew update-python-resources --package-name gh-address-cr --version "$PACKAGE_VERSION" RbBtSn0w/tap/gh-address-cr

      - name: Audit Homebrew formula
        run: brew audit --formula --strict RbBtSn0w/tap/gh-address-cr

      - name: Install Homebrew formula from source
        run: brew install --build-from-source RbBtSn0w/tap/gh-address-cr

      - name: Test Homebrew formula
        run: brew test RbBtSn0w/tap/gh-address-cr

      - name: Sync audited Homebrew formula
        run: |
          tap_path="$(brew --repository RbBtSn0w/tap)"
          cp "$tap_path/Formula/gh-address-cr.rb" homebrew-tap/Formula/gh-address-cr.rb

      - name: Commit Homebrew tap update
        working-directory: homebrew-tap
        env:
          PACKAGE_VERSION: ${{ needs.build-release-package.outputs.package_version }}
        run: |
          if [ -z "$(git status --short -- Formula/gh-address-cr.rb)" ]; then
            echo "Homebrew formula already matches gh-address-cr ${PACKAGE_VERSION}."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/gh-address-cr.rb
          git commit -m "gh-address-cr ${PACKAGE_VERSION}"
          git push
