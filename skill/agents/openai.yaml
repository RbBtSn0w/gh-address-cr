version: 1
interface:
  display_name: GH Address CR
  short_description: Operate the gh-address-cr runtime through a thin adapter.
  default_prompt: |
    Use `SKILL.md` as the source of truth.
    1. Treat `python3 scripts/cli.py` as a compatibility shim. Stateful work belongs to the external `gh-address-cr` runtime.
    2. Start with `gh-address-cr review <owner/repo> <pr_number>` or `gh-address-cr address <owner/repo> <pr_number>`.
    3. For multi-agent work, inspect `gh-address-cr agent manifest`, claim with `agent next`, fill `response_skeleton_path`, submit evidence with `agent submit` or GitHub-thread batch evidence with `agent submit-batch`, reuse evidence with `agent evidence add` when appropriate, inspect with `agent leases`, and recover stale claims with `agent reclaim`.
    4. AI agents may classify, fix, clarify, defer, reject, or verify. They must not post GitHub replies or resolve threads directly.
    5. GitHub review threads require both reply and resolve, with durable reply evidence from the current authenticated login.
    6. Local findings require valid terminal notes and validation evidence.
    7. Before any completion statement, run `gh-address-cr final-gate ...` and report the gate evidence directly from that run. Add `--require-checks` or `--require-required-checks` when PR checks are part of the requested completion proof. Include `Verified: 0 Unresolved Threads found`, `Verified: 0 Pending Reviews found`, session blocking item count, and the audit summary path + sha256. Use the machine-readable count lines only when extra run-scoped diagnostics are needed.
    8. If low-level resolve helpers are used, do not attempt resolve-only handling unless reply evidence already exists or the same action posts a fresh reply.
    9. If skill usage is blocked by contradictory instructions, missing automation, documentation gaps, or repeatable tooling failures, run `gh-address-cr submit-feedback` before giving up. Feedback goes to `RbBtSn0w/gh-address-cr` by default. Do not file feedback issues for normal PR findings, codebase bugs, or expected wait states such as `WAITING_FOR_EXTERNAL_REVIEW`.
    10. Do not include usernames, emails, tokens, machine names, or absolute local paths in feedback issues. Prefer safe technical diagnostics such as failing command, exit code, status, reason_code, waiting_on, run_id, and skill version.
    11. Always provide `--using-repo` and `--using-pr` for PR-scoped feedback so the issue body records where the problem came from. If they are omitted, `submit_feedback.py` will try to infer them from `--source-command` or `--failing-command`, but explicit values are preferred. When those fields are present, feedback can auto-collect the latest local machine summary, session metrics, audit summary hash, and cached PR head SHA. Repeated feedback is deduplicated by fingerprint.
    12. **Severity & Tone Rubric (P0-P4)**:
        - **P0 (Blocker)**: Critical system-wide crash, data loss, or severe security flaw. Reply MUST be deeply technical and demonstrate extreme urgency.
        - **P1 (Critical)**: Major logic error in core path or significant performance regression. Reply MUST provide at least two paragraphs of technical rationale.
        - **P2 (Major)**: Functional bug in standard path. Reply MUST be detailed and refer to specific logic branches.
        - **P3 (Minor)**: UX nits, missing tests for low-risk logic, sub-optimal but functional code. Reply SHOULD be concise and professional.
        - **P4 (Nit)**: Style, typos, or non-functional suggestions. Reply SHOULD be very brief and polite.
        - **Deep Comprehension**: ALL replies MUST explicitly reference variable names, logic branches, or domain terms from the reviewer's comment. Avoid boilerplate like "Fixed as requested."
    13. Do not worry about logging or generating your own execution timestamps or efficiency metrics in replies. The deterministic control plane runtime automatically intercepts skill and CLI executions and appends the Agent Efficiency Summary to the final published comment.
