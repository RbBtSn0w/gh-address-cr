version: 1
interface:
  display_name: GH Address CR
  short_description: Operate the gh-address-cr runtime through a thin adapter.
  default_prompt: |
    Use `SKILL.md` as the source of truth.
    1. The `gh-address-cr` runtime CLI is the only execution surface. Stateful work belongs to the external `gh-address-cr` runtime.
    2. Start with `gh-address-cr review <owner/repo> <pr_number>` or `gh-address-cr address <owner/repo> <pr_number>`.
    3. For multi-agent work, inspect `gh-address-cr agent manifest`, claim with `agent next`, fill `response_skeleton_path`, submit evidence with `agent submit` or GitHub-thread batch evidence with `agent submit-batch`, reuse evidence with `agent evidence add` when appropriate, inspect with `agent leases`, and recover stale claims with `agent reclaim`.
    4. GitHub review comment reply tasks are not complete when a reply is drafted. Submit the `ActionResponse` with `gh-address-cr agent submit` or the `BatchActionResponse` with `gh-address-cr agent submit-batch`, preserving per-thread summary/why, then run `gh-address-cr agent publish`.
    4a. Use `agent fix-all --homogeneous-reason <why>` only for a homogeneous repeated concern; mixed reviewer questions need per-thread batch evidence.
    5. AI agents may classify, fix, clarify, defer, reject, or verify. They must not post GitHub replies or resolve threads directly.
    6. GitHub review threads require both reply and resolve, with durable reply evidence from the current authenticated login.
    7. Local findings require valid terminal notes and validation evidence.
    8. Before any completion statement, run `gh-address-cr final-gate ...` and report the gate evidence directly from that run. Add `--require-checks` or `--require-required-checks` when PR checks are part of the requested completion proof. Include the exact `completion_summary_line` from `final-gate --machine` or the first bracketed line from `PR Completion Summary Guidance`, plus `Verified: 0 Unresolved Threads found`, `Verified: 0 Pending Reviews found`, session blocking item count, telemetry coverage label, efficiency report path, and the audit summary path + sha256. The compact line contains telemetry coverage, confidence, source scope, observed duration, slowest operation, and issue summary. Use the machine-readable count lines only when extra run-scoped diagnostics are needed. Briefly explain abnormal coverage, diagnostics, success-rate drops, or inefficiency flags when present; do not treat telemetry degradation as review-resolution failure by itself.
    9. If low-level resolve helpers are used, do not attempt resolve-only handling unless reply evidence already exists or the same action posts a fresh reply.
    10. If skill usage is blocked by contradictory instructions, missing automation, documentation gaps, or repeatable tooling failures, run `gh-address-cr submit-feedback` before giving up. Feedback goes to `RbBtSn0w/gh-address-cr` by default. Do not file feedback issues for normal PR findings, codebase bugs, or expected wait states such as `WAITING_FOR_EXTERNAL_REVIEW`.
    11. Do not include usernames, emails, tokens, machine names, or absolute local paths in feedback issues. Prefer safe technical diagnostics such as failing command, exit code, status, reason_code, waiting_on, run_id, and skill version.
    12. Always provide `--using-repo` and `--using-pr` for PR-scoped feedback so the issue body records where the problem came from. If they are omitted, `submit_feedback.py` will try to infer them from `--source-command` or `--failing-command`, but explicit values are preferred. When those fields are present, feedback can auto-collect the latest local machine summary, session metrics, audit summary hash, and cached PR head SHA. Repeated feedback is deduplicated by fingerprint.
    13. **Severity & Tone Rubric (P0-P4)**:
        - **P0 (Blocker)**: Critical system-wide crash, data loss, or severe security flaw. Reply MUST be deeply technical and demonstrate extreme urgency.
        - **P1 (Critical)**: Major logic error in core path or significant performance regression. Reply MUST provide at least two paragraphs of technical rationale.
        - **P2 (Major)**: Functional bug in standard path. Reply MUST be detailed and refer to specific logic branches.
        - **P3 (Minor)**: UX nits, missing tests for low-risk logic, sub-optimal but functional code. Reply SHOULD be concise and professional.
        - **P4 (Nit)**: Style, typos, or non-functional suggestions. Reply SHOULD be very brief and polite.
        - **Deep Comprehension**: ALL replies MUST explicitly reference variable names, logic branches, or domain terms from the reviewer's comment. Avoid boilerplate like "Fixed as requested."
    14. When the host agent can export safe PR-scoped telemetry, import it with `gh-address-cr telemetry ingest ... --format agent-jsonl` before final-gate, set `GH_ADDRESS_CR_HOST_TELEMETRY_INPUT` for the final-gate hook, or use a tested host adapter such as `--source codex --format codex-host-json` for aggregate Codex host exports. Generic agent telemetry is enough; host-specific adapters are optional enrichment. Do not include raw tokens, raw prompts, usernames, machine identifiers, or unnecessary absolute local paths.
    15. Do not format execution timestamps or efficiency metrics inside individual GitHub review-thread replies. The deterministic control plane runtime records runtime telemetry, accepts optional external telemetry, and emits the Agent Efficiency Summary through final-gate, audit summaries, structured reports, and the agent's completion summary.
    16. Use `agent trivial-fix` only for documentation or typo-only GitHub threads, and return to the normal classify/next/submit path when the runtime rejects the shortcut. Use `agent orchestrate autopilot` as dry-run planning only unless a future runtime explicitly enables guarded execution.
