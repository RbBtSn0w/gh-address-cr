# Superpowers Bridge Configuration Template
#
# This template configures bridge behavior only.
# It does not define remote fallback rules or bundled skill content.

discovery:
  # Search order for installed superpowers skills.
  # workspace => ./.agents/skills
  # global    => ~/.agents/skills
  search_order:
    - workspace
    - global

disciplines:
  # Test-first behavior is required even when no upstream skill is installed.
  required:
    - test-first

upstream_skills:
  # These skills deepen guidance but are not required for the Spec Kit path.
  optional:
    - test-driven-development
    - brainstorming
    - systematic-debugging
    - receiving-code-review
    - finishing-a-development-branch

hook_policy:
  # Superb contributes only bounded refinement and readiness hooks.
  required:
    - before_implement

  optional:
    - after_specify

commands:
  enable_brainstorm: true
  enable_critique: true
  enable_debug: true
  enable_finish: true
  enable_respond: true

# Local override file (recommended for experimentation, gitignored):
# superb-config.local.yml
