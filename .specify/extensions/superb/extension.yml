schema_version: "1.0"

extension:
  id: superb
  name: Superpowers Bridge
  version: 1.9.0
  description: "Bridges selected Superpowers disciplines into Spec Kit as evidence-first trust gates for agent workflows."
  author: RbBtSn0w
  repository: https://github.com/RbBtSn0w/spec-kit-extensions
  license: MIT
  homepage: https://github.com/RbBtSn0w/spec-kit-extensions

requires:
  speckit_version: ">=0.12.0"
  tools:
    - name: superpowers
      required: false
      version: ">=5.0.0"

provides:
  commands:
    - name: speckit.superb.check
      file: commands/check.md
      description: >
        Bridge-native diagnostics command. Verifies that the five Superpowers
        contract skills are installed in workspace or global skill roots and
        reports which hooks are ready to run.

    - name: speckit.superb.brainstorm
      file: commands/brainstorm.md
      description: >
        Optional after-specify refinement gate. Bridges an installed
        superpowers brainstorming skill into the active Spec Kit spec.md without
        creating a second design document or replacing speckit.specify.

    - name: speckit.superb.implementation-gate
      file: commands/implementation-gate.md
      description: >
        Mandatory pre-implement gate. Reports test-first readiness and falls
        back to a bridge-native minimum when upstream TDD guidance is absent.

    - name: speckit.superb.critique
      file: commands/critique.md
      description: >
        Persistent spec-aligned code-review agent. Loads spec.md, plan.md, and
        tasks.md, then reviews every diff against the declared requirements,
        reporting issues by severity (Critical / Important / Minor).
        Bridge-native command.

    - name: speckit.superb.debug
      file: commands/debug.md
      description: >
        Systematic debugging protocol. Bridges an installed superpowers
        systematic-debugging skill. Enforces root-cause investigation before any
        fix attempt. Escalation path from the TDD gate when 2+ fixes fail.

    - name: speckit.superb.respond
      file: commands/respond.md
      description: >
        Code review response protocol. Bridges an installed superpowers
        receiving-code-review skill. Enforces technical verification before
        implementing feedback. Pairs with critique as the implementer
        counterpart.

    - name: speckit.superb.finish
      file: commands/finish.md
      description: >
        Development branch completion after Spec Kit convergence and fresh
        project checks. Presents explicit merge, PR, keep, or discard options.

  config:
    - name: superb-config.yml
      template: superb-config.template.yml
      description: "Superpowers Bridge configuration"
      required: false

hooks:
  after_specify:
    command: speckit.superb.brainstorm
    optional: true
    prompt: "Refine the new spec.md with Superpowers brainstorming before clarification or planning?"
    description: >
      Optional spec refinement gate. Uses an installed superpowers
      brainstorming skill to strengthen the active Spec Kit spec.md while
      preserving Spec Kit ownership of specification creation.

  before_implement:
    command: speckit.superb.implementation-gate
    optional: false
    description: >
      Mandatory readiness gate. Reports test-first constraints without
      executing tasks or taking ownership from speckit.implement.

tags:
  - quality-gates
  - tdd
  - code-review
  - workflow
  - superpowers
  - verification
  - debugging
  - branch-management
