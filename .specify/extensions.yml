installed:
- agent-context
- memorylint
- superb
settings:
  auto_execute_hooks: true
hooks:
  before_constitution:
  - extension: git
    command: speckit.git.initialize
    enabled: true
    optional: false
    prompt: Execute speckit.git.initialize?
    description: Initialize Git repository before constitution setup
    condition: null
  - extension: memorylint
    command: speckit.memorylint.audit
    enabled: true
    optional: true
    priority: 10
    prompt: Run MemoryLint audit to generate a boundary report before constitution
      generation?
    description: ''
    condition: null
  before_specify:
  - extension: git
    command: speckit.git.feature
    enabled: true
    optional: false
    prompt: Execute speckit.git.feature?
    description: Create feature branch before specification
    condition: null
  before_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before clarification?
    description: Auto-commit before spec clarification
    condition: null
  before_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before planning?
    description: Auto-commit before implementation planning
    condition: null
  - extension: memorylint
    command: speckit.memorylint.load-agents
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.memorylint.load-agents?
    description: 'Mandatory gate: Load AGENTS.md to enforce core rules and prevent
      rule drift during the planning (plan.md generation) phase.'
    condition: null
  before_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before task generation?
    description: Auto-commit before task generation
    condition: null
  before_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before implementation?
    description: Auto-commit before implementation
    condition: null
  - extension: superb
    command: speckit.superb.controller
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.superb.controller?
    description: 'Mandatory Controller gate. Bridges installed execution and quality
      skills to orchestrate task implementation.

      '
    condition: null
  before_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before checklist?
    description: Auto-commit before checklist generation
    condition: null
  before_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before analysis?
    description: Auto-commit before analysis
    condition: null
  before_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before issue sync?
    description: Auto-commit before tasks-to-issues conversion
    condition: null
  after_constitution:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit constitution changes?
    description: Auto-commit after constitution update
    condition: null
  - extension: memorylint
    command: speckit.memorylint.audit
    enabled: true
    optional: true
    priority: 10
    prompt: Run MemoryLint audit to check for conflicts between constitution and AGENTS.md?
    description: ''
    condition: null
  after_specify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit specification changes?
    description: Auto-commit after specification
    condition: null
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after specification
    condition: null
  - extension: superb
    command: speckit.superb.brainstorm
    enabled: true
    optional: true
    priority: 10
    prompt: Refine the new spec.md with Superpowers brainstorming before clarification
      or planning?
    description: 'Optional spec refinement gate. Uses an installed superpowers brainstorming
      skill to strengthen the active Spec Kit spec.md while preserving Spec Kit ownership
      of specification creation.

      '
    condition: null
  after_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit clarification changes?
    description: Auto-commit after spec clarification
    condition: null
  after_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit plan changes?
    description: Auto-commit after implementation planning
    condition: null
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after planning
    condition: null
  - extension: superb
    command: speckit.superb.plan-gate
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.superb.plan-gate?
    description: 'Mandatory Plan gate. Verifies plan completeness and injects SDD
      directives into plan.md for agentic workers.

      '
    condition: null
  after_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit task changes?
    description: Auto-commit after task generation
    condition: null
  - extension: superb
    command: speckit.superb.review
    enabled: true
    optional: true
    priority: 10
    prompt: Review tasks.md for coverage and TDD-readiness before implementation?
    description: 'Catches missing or under-specified tasks at planning time. Produces
      a requirement coverage and TDD-readiness report. Bridge-native logic.

      '
    condition: null
  after_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit implementation changes?
    description: Auto-commit after implementation
    condition: null
  - extension: superb
    command: speckit.superb.verify
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.superb.verify?
    description: 'Mandatory completion gate. Bridges an installed superpowers verification-before-completion
      skill and extends it with spec-kit spec-coverage checks. Prevents false completions.

      '
    condition: null
  after_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit checklist changes?
    description: Auto-commit after checklist generation
    condition: null
  after_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit analysis results?
    description: Auto-commit after analysis
    condition: null
  after_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit after syncing issues?
    description: Auto-commit after tasks-to-issues conversion
    condition: null
  after_converge:
  - extension: superb
    command: speckit.superb.verify
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.superb.verify?
    description: 'Mandatory evidence-first gate after convergence. speckit-converge
      only assesses and appends remaining tasks to tasks.md; the hook runs verification
      at convergence completion to ensure convergence-driven work still proves completion
      with fresh evidence. Blocking-on-missing-evidence is inherited from the same
      verify command used by after_implement.

      '
    condition: null
